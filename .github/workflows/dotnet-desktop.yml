name: .NET Backend CI

on:
  workflow_dispatch:
  push:
    branches: ["master", "main", "Main"]
  pull_request:
    branches: ["master", "main", "Main"]

permissions:
  contents: read

concurrency:
  group: dotnet-backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 8.0.x
  SOLUTION_PATH: Coolzo.sln
  BUILD_CONFIGURATION: Release
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Discover test projects
        id: discover-tests
        shell: bash
        run: |
          mapfile -t test_projects < <(find . -type f \( -name '*Tests.csproj' -o -name '*.Tests.csproj' -o -name '*Test.csproj' -o -name '*.Test.csproj' \) | sort)

          if [ "${#test_projects[@]}" -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No test projects found. Skipping dotnet test."
            exit 0
          fi

          printf '%s\n' "${test_projects[@]}" > test-projects.txt
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Run tests
        if: steps.discover-tests.outputs.found == 'true'
        shell: bash
        run: |
          mkdir -p TestResults

          while IFS= read -r project; do
            test_name="$(basename "${project%.csproj}")"
            dotnet test "$project" \
              --configuration "${{ env.BUILD_CONFIGURATION }}" \
              --no-restore \
              --logger "trx;LogFileName=${test_name}.trx" \
              --results-directory TestResults
          done < test-projects.txt

      - name: Upload test results
        if: always() && steps.discover-tests.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: TestResults
          if-no-files-found: ignore
